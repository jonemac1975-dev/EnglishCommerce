<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Preview tài liệu</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: system-ui;
  background: #e5e7eb;
}

.wrapper {
  max-width: 1100px;
  margin: 20px auto;
  background: #fff;
  border-radius: 16px;
  padding: 20px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.08);
}

.title {
  font-size: 22px;
  font-weight: bold;
  text-align: center;
}

.content {
  margin-top: 20px;
}

iframe {
  width: 100%;
  height: 75vh;
  border: none;
  border-radius: 12px;
}

img {
  max-width: 100%;
  border-radius: 12px;
  display: block;
  margin: auto;
}

video {
  width: 100%;
  border-radius: 12px;
}

audio {
  width: 100%;
}

.fallback {
  margin-top: 10px;
  text-align: center;
}

.toolbar {
  position: fixed;
  top: 10px;
  left: 10px;
}

.btn {
  background: #111827;
  color: #fff;
  border: none;
  padding: 8px 12px;
  border-radius: 8px;
  margin-right: 5px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="toolbar">
  <button class="btn" onclick="history.back()">←</button>
</div>

<div class="wrapper">
  <div class="title" id="title"></div>
  <div class="content" id="content"></div>
</div>

<script>
const data = JSON.parse(localStorage.getItem("lesson_preview") || "{}");

const titleEl = document.getElementById("title");
const contentEl = document.getElementById("content");

titleEl.innerText = data.title || "Tài liệu";

/* ================= NORMALIZE ================= */
function normalizeUrl(url) {
  if (!url) return "";

  // FlipHTML5
  if (url.includes("fliphtml5.com")) {
    if (!url.endsWith("index.html")) {
      if (!url.endsWith("/")) url += "/";
      url += "index.html";
    }
  }

  // Google Drive file
  if (url.includes("drive.google.com/file/d/")) {
    const id = url.split("/d/")[1].split("/")[0];
    return `https://drive.google.com/file/d/${id}/preview`;
  }

  return url;
}

/* ================= BUILD EMBED ================= */
function buildEmbed(url) {
  if (!url) return "<i>Không có nội dung</i>";

  // 🔥 FlipHTML5
  if (url.includes("fliphtml5.com")) {
  const parts = url.split("/").filter(Boolean);
  const bookId = parts[parts.length - 2];
  const bookName = parts[parts.length - 1];

  const embedUrl = `https://online.fliphtml5.com/${bookId}/${bookName}/index.html`;

  return `
    <iframe 
      src="${embedUrl}" 
      style="width:100%;height:80vh;border:none"
      allow="fullscreen"
      referrerpolicy="no-referrer">
    </iframe>
  `;
}
  // 👉 VIDEO
  if (url.match(/\.(mp4|webm|ogg)$/i)) {
    return `
      <video controls style="width:100%">
        <source src="${url}">
      </video>
    `;
  }

  // 👉 AUDIO
  if (url.match(/\.(mp3|wav|ogg)$/i)) {
    return `
      <audio controls style="width:100%">
        <source src="${url}">
      </audio>
    `;
  }

  // 👉 IMAGE
  if (url.match(/\.(jpg|jpeg|png|webp|gif)$/i)) {
    return `<img src="${url}" style="max-width:100%;border-radius:12px">`;
  }

  // 👉 PDF
  if (url.endsWith(".pdf")) {
    return iframe(url);
  }

  // 👉 PPTX
  if (url.endsWith(".pptx")) {
    return iframe(
      "https://view.officeapps.live.com/op/embed.aspx?src=" + encodeURIComponent(url)
    );
  }

  // 👉 WORD
  if (url.match(/\.(doc|docx)$/i)) {
    return iframe(
      "https://view.officeapps.live.com/op/embed.aspx?src=" + encodeURIComponent(url)
    );
  }

  // 👉 Google Docs
  if (url.includes("docs.google.com/document")) {
    const id = url.match(/\/d\/([^/]+)/)?.[1];
    if (id) return iframe(`https://docs.google.com/document/d/${id}/preview`);
  }

  // 👉 Google Slides
  if (url.includes("docs.google.com/presentation")) {
    const id = url.match(/\/d\/([^/]+)/)?.[1];
    if (id) return iframe(`https://docs.google.com/presentation/d/${id}/embed`);
  }

  // 👉 YouTube
  if (url.includes("youtube.com/watch") || url.includes("youtu.be")) {
    let videoId = "";

    if (url.includes("youtu.be")) {
      videoId = url.split("/").pop();
    } else {
      videoId = new URL(url).searchParams.get("v");
    }

    return iframe(`https://www.youtube.com/embed/${videoId}`);
  }

  // 👉 DEFAULT
  return iframe(url);
}

/* ================= IFRAME HELPER ================= */
function iframe(src, label = "Mở link") {
  return `
    <iframe src="${src}" allowfullscreen></iframe>
    <div class="fallback">
      <a href="${src}" target="_blank">🔗 ${label}</a>
    </div>
  `;
}

/* ================= RENDER ================= */
function render() {

  // URL
  if (data.url) {
    contentEl.innerHTML = buildEmbed(data.url);
    return;
  }

  // HTML Word (đã convert)
  if (data.content_html) {
    contentEl.innerHTML = `<div class="word-content">${data.content_html}</div>`;
    return;
  }

  // IMAGE fallback
  if (data.image) {
    contentEl.innerHTML = `<img src="${data.image}">`;
    return;
  }

  contentEl.innerHTML = "<i>Không có nội dung</i>";
}

render();
</script>

</body>
</html>
