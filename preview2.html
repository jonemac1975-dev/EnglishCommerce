<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Preview tài liệu</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body {
    margin: 0;
    font-family: system-ui;
    background: #e5e7eb;
  }

  .wrapper {
    max-width: 1100px;
    margin: 20px auto;
    background: #fff;
    border-radius: 16px;
    padding: 20px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.08);
  }

  .title {
    font-size: 24px;
    font-weight: bold;
    text-align: center;
    margin-bottom: 10px;
  }

  .content {
    margin-top: 20px;
    text-align: center;
  }

  iframe {
    width: 100%;
    height: 80vh;
    border: none;
    border-radius: 12px;
  }

  img {
    max-width: 100%;
    border-radius: 12px;
    margin: 10px 0;
    cursor: zoom-in;
    transition: 0.3s;
  }

  img:hover {
    transform: scale(1.02);
  }

  .word-content img {
    display: block;
    margin: 14px auto;
  }

  .toolbar {
    position: fixed;
    top: 10px;
    left: 10px;
    z-index: 999;
  }

  .btn {
    background: #111827;
    color: #fff;
    border: none;
    padding: 8px 12px;
    border-radius: 8px;
    cursor: pointer;
    margin-right: 6px;
  }

  .btn:hover {
    opacity: 0.9;
  }

  /* zoom overlay */
  .zoom-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 9999;
  }

  .zoom-overlay img {
    max-width: 90%;
    max-height: 90%;
    border-radius: 12px;
  }

</style>
</head>

<body>

<div class="toolbar">
  <button class="btn" onclick="goHome()">←</button>
  <button class="btn" onclick="toggleFullscreen()">⛶</button>
</div>

<div class="wrapper">
  <div class="title" id="title"></div>
  <div class="content" id="content"></div>
</div>

<div class="zoom-overlay" id="zoomBox" onclick="closeZoom()">
  <img id="zoomImg">
</div>

<script>
const data = JSON.parse(localStorage.getItem("lesson_preview") || "{}");

const titleEl = document.getElementById("title");
const contentEl = document.getElementById("content");

titleEl.innerText = data.title || "Tài liệu";

/* ===== DETECT ===== */
function isPDF(url) {
  return url && url.toLowerCase().includes(".pdf");
}

function isDrive(url) {
  return url && url.includes("drive.google.com");
}

function isHTML(url) {
  return url && url.endsWith(".html");
}

/* ===== RENDER ===== */
function render() {

  // 👉 URL (PDF / Drive / FlipHTML)
  if (data.url) {
    contentEl.innerHTML = `<iframe src="${data.url}"></iframe>`;
    return;
  }

  // 👉 WORD HTML
  if (data.content_html) {
    contentEl.innerHTML = `<div class="word-content">${data.content_html}</div>`;
    attachZoom();
    return;
  }

  // 👉 IMAGE
  if (data.image) {
    contentEl.innerHTML = `<img src="${data.image}" onclick="zoomImg(this.src)">`;
    return;
  }

  contentEl.innerHTML = "<i>Không có nội dung</i>";
}

render();
renderEmbeds();

function renderEmbeds() {
  const blocks = document.querySelectorAll(".embed-block");

  blocks.forEach(el => {
    const url = el.dataset.url;
    if (!url) return;

    let html = "";

    // 👉 Google Slides
    if (url.includes("docs.google.com/presentation")) {
      const m = url.match(/\/d\/([^/]+)/);
      if (m) {
        html = `
          <iframe 
            src="https://docs.google.com/presentation/d/${m[1]}/embed"
            style="width:100%;height:600px;border:none;border-radius:12px">
          </iframe>
        `;
      }
    }

    // 👉 PPTX
    else if (url.endsWith(".pptx")) {
      html = `
        <iframe 
          src="https://view.officeapps.live.com/op/embed.aspx?src=${encodeURIComponent(url)}"
          style="width:100%;height:600px;border:none;border-radius:12px">
        </iframe>
      `;
    }

    // 👉 PDF
    else if (url.endsWith(".pdf")) {
      html = `
        <iframe 
          src="${url}"
          style="width:100%;height:600px;border:none;border-radius:12px">
        </iframe>
      `;
    }

    // 👉 fallback
    else {
      html = `
        <a href="${url}" target="_blank">
          🔗 Mở nội dung
        </a>
      `;
    }

    el.innerHTML = html;
  });
}

/* ===== ZOOM ===== */
function attachZoom() {
  const imgs = document.querySelectorAll(".word-content img");

  imgs.forEach(img => {
    img.onclick = () => zoomImg(img.src);
  });
}

function zoomImg(src) {
  const box = document.getElementById("zoomBox");
  const img = document.getElementById("zoomImg");

  img.src = src;
  box.style.display = "flex";
}

function closeZoom() {
  document.getElementById("zoomBox").style.display = "none";
}

/* ===== NAV ===== */
function goHome() {
  window.location.href = "../index.html";
}

/* ===== FULLSCREEN ===== */
async function toggleFullscreen() {
  if (!document.fullscreenElement) {
    await document.documentElement.requestFullscreen();
  } else {
    await document.exitFullscreen();
  }
}
</script>

</body>
</html>
