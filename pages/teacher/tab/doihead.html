<div class="doihead-wrap">
  <h2>🎨 CẬP NHẬT HÌNH NỀN HEAD</h2>

  <div class="doihead-form">
    <label><b>Tiêu đề</b></label>
    <input type="text" id="headTitle" placeholder="Nhập tiêu đề..." />

    <label><b>Tên giáo viên</b></label>
    <input type="text" id="headTeacher" placeholder="Nhập tên giáo viên..." />

    <label><b>Câu slogan</b></label>
    <input type="text" id="headSlogan" placeholder="Nhập câu slogan..." />

    <div style="display:flex; gap:10px; flex-wrap:wrap; margin-top:15px;">
      <button id="btnSaveHead">✏️ Sửa</button>
      <button id="btnResetHead" type="button">♻️ Mặc định</button>
    </div>
  </div>

  <hr style="margin:20px 0; border:none; border-top:1px dashed #ddd;">

  <h3>👀 Xem trước Header</h3>
  <div id="headPreview"></div>
</div>
