<section class="chambai-wrap">
  <h2 class="cb-title">CHẤM BÀI KIỂM TRA</h2>

  <!-- Bộ lọc -->
  <div class="cb-filter">

    <div class="cb-row">
      <label><b>Kỳ kiểm tra</b></label>
      <select id="cb_kythi"></select>
    </div>

    <div class="cb-row">
      <label><b>Lớp</b></label>
      <select id="cb_lop"></select>
    </div>

    <div class="cb-row">
      <label><b>Môn học</b></label>
      <select id="cb_monhoc"></select>
    </div>

  </div>



  <!-- Danh sách bài nộp -->
  <h3><b>Danh sách bài kiểm tra đã nộp</b></h3>
<div id="cbThongKe"></div>


  <table class="cb-table">
    <thead>
      <tr>
        <th>STT</th>
        <th>Họ tên sinh viên</th>
        <th>Mã đề</th>
        <th>Loại đề</th>
        <th>Điểm TN</th>
        <th>Điểm TL</th>
        <th>Tổng điểm</th>
        <th>Trạng thái</th>
        <th>Hành động</th>
      </tr>
    </thead>

    <tbody id="cb_list"></tbody>
  </table>

  <!-- Khung chấm -->
  <div id="cb_detail"
       style="display:none; margin-top:24px;">
    <h3><b>CHẤM BÀI TỰ LUẬN</b></h3>
    <div class="cb-info">
      <p>
        <b>Sinh viên:</b>
        <span id="cb_hocvien"></span>
      </p>
      <p><b>Mã đề   :</b> <span id="cb_made"></span></p>
      <p><b>Cơ cấu điểm:</b> <span id="cb_cocau"></span></p>
      <p>
        <b>Loại đề kiểm tra:</b>
        <span id="cb_tenbai"></span>
      </p>
      <p>
        <b>Điểm TN:</b>
        <span id="cb_diem_tn">0</span>
      </p>

      <p>
        <b>Điểm TL tối đa:</b>
        <span id="cb_diem_tl_max">0</span>
      </p>

      <p>
        <b>Tổng điểm hiện tại:</b>
        <span id="cb_tongdiem">0</span>
      </p>

    </div>

    <div id="cb_essay_container"></div>

    <div class="cb-actions">
      <button id="cb_save">
        💾 Lưu điểm tự luận
      </button>
    </div>

<div class="cb-signature-wrap">
  <div><b>Chữ ký giáo viên</b></div>

  <img
    id="cbTeacherSignature"
    class="cb-signature-img"
    style="display:none"
  >

  <div
    id="cbTeacherName"
    class="cb-signature-name">
  </div>
</div>

  </div>

</section>
