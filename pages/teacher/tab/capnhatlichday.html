<h2>CẬP NHẬT LỊCH DẠY</h2>

  <label>Lớp:</label>
  <select id="ldLop"></select>

<label>Môn học:</label>
<select id="ldMonHoc"></select>

  <label>Năm:</label>
  <input type="number" id="ldNam" readonly>

  <label>Tháng:</label>
  <select id="ldThang"></select>

  <label>Tuần:</label>
  <select id="ldTuan">
    <option value="1">Tuần 1</option>
    <option value="2">Tuần 2</option>
    <option value="3">Tuần 3</option>
    <option value="4">Tuần 4</option>
  </select>

  <label>Từ ngày:</label>
  <input type="date" id="ldTuNgay">
  <label>Đến ngày:</label>
  <input type="date" id="ldDenNgay">

  <div class="lichday-box">
  <div class="lichday-head"><b>LỊCH DẠY</b></div>

  <div class="lichday-grid">
    <!-- Thứ 2 -->
    <div class="day-col">
      <label>
        <input type="checkbox" class="day-check" data-day="t2">
        Thứ 2
      </label>
      <input type="text" class="day-time" data-day="t2"
             placeholder="VD:Tiết 1-2-3" disabled>
    </div>

    <!-- Thứ 3 -->
    <div class="day-col">
      <label>
        <input type="checkbox" class="day-check" data-day="t3">
        Thứ 3
      </label>
      <input type="text" class="day-time" data-day="t3"
             placeholder="VD:Tiết 1-2-3" disabled>
    </div>

    <!-- Thứ 4 -->
    <div class="day-col">
      <label>
        <input type="checkbox" class="day-check" data-day="t4">
        Thứ 4
      </label>
      <input type="text" class="day-time" data-day="t4"
             placeholder="VD:Tiết 1-2-3" disabled>
    </div>

    <!-- Thứ 5 -->
    <div class="day-col">
      <label>
        <input type="checkbox" class="day-check" data-day="t5">
        Thứ 5
      </label>
      <input type="text" class="day-time" data-day="t5"
             placeholder="VD:Tiết 1-2-3" disabled>
    </div>

    <!-- Thứ 6 -->
    <div class="day-col">
      <label>
        <input type="checkbox" class="day-check" data-day="t6">
        Thứ 6
      </label>
      <input type="text" class="day-time" data-day="t6"
             placeholder="VD:Tiết 1-2-3" disabled>
    </div>

    <!-- Thứ 7 -->
    <div class="day-col">
      <label>
        <input type="checkbox" class="day-check" data-day="t7">
        Thứ 7
      </label>
      <input type="text" class="day-time" data-day="t7"
             placeholder="VD:Tiết 1-2-3" disabled>
    </div>

    <!-- CN -->
    <div class="day-col">
      <label>
        <input type="checkbox" class="day-check" data-day="cn">
        CN
      </label>
      <input type="text" class="day-time" data-day="cn"
             placeholder="VD:Tiết 1-2-3" disabled>
    </div>
  </div>
</div>


  <div class="btn-row">
    <button id="btnThem">Thêm</button>
    <button id="btnLuu" style="display:none">Lưu</button>
    <button id="btnXoa" style="display:none">Xóa</button>
  </div>
</div>

<hr>

<h3 class="xemlich-title">Xem lịch dạy</h3>

<div class="xemlich-filter">
  <label>Năm:</label>
  <select id="fNam"></select>

  <label>Tháng:</label>
  <select id="fThang"></select>
</div>

<div id="lichdayWeeksWrap"></div>
