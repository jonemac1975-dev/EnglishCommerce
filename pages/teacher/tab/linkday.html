<h2>📘 CẬP NHẬT LINK DẠY</h2>

<div class="kt-form">
  <label>Chọn lớp</label>
  <select id="linkLop">
    <option value="">Chọn lớp</option>
  </select>

  <div class="row">
  <label>Link dạy</label>
  <input id="link_made" 
         type="url" 
         placeholder="https://zoom.us/... hoặc https://meet.google.com/..." 
         pattern="https://.*(zoom\.us|meet\.google\.com)/.*" 
         title="Chỉ nhập link Zoom hoặc Google Meet" 
         required>
</div>
<!-- Popup xem link -->
<div id="previewPopup" style="
    display:none; position:fixed; top:10%; left:10%; width:80%; height:80%;
    background:#fff; border:2px solid #333; z-index:9999;
">
  <div style="text-align:right;">
    <button onclick="document.getElementById('previewPopup').style.display='none'">✖</button>
  </div>
  <iframe id="previewFrame" src="" style="width:100%;height:90%;border:none;"></iframe>
</div>

  <div class="actions">
    <button id="btnAdd">➕ Thêm</button>
    <button id="btnSave">💾 Lưu</button>
  </div>
</div>

<hr>

<h3>📋 Danh sách Link</h3>
<table class="kt-table">
  <thead>
    <tr>
      <th>STT</th>
      <th>Link</th>
      <th>Lớp</th>
      <th>Hành động</th>
    </tr>
  </thead>
  <tbody id="test_list"></tbody>
</table>

<!-- Toast popup -->
<div id="toast" style="
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #333;
    color: #fff;
    padding: 12px 20px;
    border-radius: 8px;
    display: none;
    box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    font-family: sans-serif;
    z-index: 9999;
"></div>
