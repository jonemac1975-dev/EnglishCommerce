<section class="kiemtra-wrap">
  <h2 class="kt-title">CẬP NHẬT ĐIỂM THƯỜNG XUYÊN</h2>
  <div class="kt-form">
    <div class="kt-row">
      <label><b>Giáo viên</b></label>
      <input type="text" id="kt_giaovien" readonly />
    </div>

<div class="kt-row">
      <label><b>Kỳ kiểm tra</b></label>
      <select id="kt_kythi">
  <option value="tx_hk1">
    Thường xuyên HK1
  </option>

  <option value="tx_hk2">
    Thường xuyên HK2
  </option>
</select>
    </div>

<div class="kt-row">
      <label><b>Lớp</b></label>
      <select id="kt_lop">
  <option value="">-- Chọn lớp --</option>
</select>
    </div>

    <div class="kt-row">
      <label><b>Môn học</b></label>
      <select id="kt_monhoc">
  <option value="">-- Chọn môn học --</option>
</select>
    </div>

<div class="kt-row">
      <label><b>Sinh viên</b></label>
      <select id="kt_sinhvien">
  <option value="">-- Chọn sinh viên --</option>
</select>
    </div>
<div class="kt-row">
      <label><b>Số điểm</b></label>
     <input
  type="number"
  id="kt_diemTX"
  min="0"
  max="10"
  step="0.1"
  placeholder="Nhập điểm 0 - 10"
/>
    </div>

    <div class="kt-row">
      <label><b>Ngày cập nhật</b></label>
      <input type="date" id="kt_ngay" />
    </div>
   
    <div class="kt-actions">
      <button type="button" id="kt_add">➕Thêm</button>
      <button type="button" id="kt_save">💾Lưu</button>
    </div>
  </div>

  <h3><b>Danh sách điểm thường xuyên</b></h3>
  <table class="kt-table">
    <thead>
      <tr>
  <th>STT</th>
  <th>Tên sinh viên</th>
  <th>Lớp</th>
  <th>Ngày KT</th>
  <th>Môn</th>
  <th>Loại KT</th>
  <th>Điểm</th>
  <th>Hành động</th>
</tr>
    </thead>
    <tbody id="kt_list"></tbody>
  </table>
</section>
