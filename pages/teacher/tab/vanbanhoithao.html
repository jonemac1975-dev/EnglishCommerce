<div class="card baigiang-card">

  <h2 class="section-title">CẬP NHẬT ĐÈ TÀI - VĂN BẢN HỘI THẢO</h2>

  <div class="form-grid">

    <div class="form-group">
      <label><b>ID</b></label>
      <input id="bgId" readonly>
    </div>
        

    <div class="form-group full">
      <label><b>Tên văn bản</label>
      <input id="bgVanBan">
    </div>

    <div class="form-group">
      <label><b>Link MP3 - 1</label>
      <input id="bgMp3">
    <div id="previewMp3"></div>
    </div>

<div class="form-group">
      <label><b>Link MP3 - 2</label>
      <input id="bgMp32">
    <div id="previewMp32"></div>
    </div>

    <div class="form-group">
      <label><b>Link MP4</label>
      <input id="bgMp4">
<div id="previewMp4"></div>
    </div>

    <div class="form-group">
      <label><b>Link Youtube</label>
      <input id="bgYoutube">
     <div id="previewYoutube"></div>
    </div>

    <div class="form-group">
      <label><b>Ngàycập nhật </label>
      <input type="date" id="bgNgay">
    </div>

    <div class="form-group full">
  <label><b>Dán nội dung từ Word vào đây :</b></label>
</div>

<div class="form-group full">
  <label>Đặt trỏ tại vị trí cần chèn rồi nhấn các nút bên dưới để chèn</label>

  <div class="editor-toolbar">
    <button type="button" onclick="chooseImage()">🖼️ Chèn ảnh</button>
    <input type="file" id="imageInput" accept="image/*" hidden>

    <button type="button" onclick="insertPDF()">📄 PDF</button>
    <button type="button" onclick="insertPPT()">📊 PPTx – FlipHTML5</button>
    <button type="button" onclick="previewContent()">👁️ Preview</button>
  </div>
</div>

<div class="form-group full">
  <label>Nội dung văn bản</label>
  <div id="bgNoiDung" contenteditable="true"></div>
</div>

    </div>

  </div>

  <div class="actions">
    <button class="btn-primary" onclick="addVanBan()">➕Thêm</button>
    <button class="btn-secondary" onclick="saveVanBan()">💾Lưu</button>
  </div>

  <hr>

  <h3>Danh sách văn bản</h3>

  <table class="bg-table">
    <thead>
      <tr>
        <th>STT</th>
        <th>Tên văn bản</th>
        <th>Ngày</th>
        <th>Hành động</th>
      </tr>
    </thead>
    <tbody id="bgList"></tbody>
  </table>

</div>
