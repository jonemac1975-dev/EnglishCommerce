<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Hồ sơ giáo viên</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="./css/teacher.css">
</head>

<body>
  <div class="page-wrapper">
    <div class="card profile-card">

      <div class="page-title">Hồ sơ giáo viên</div>
          
      <div id="msg" class="msg"></div>

      <!-- AVATAR -->
      <div class="avatar-box">
        <img id="avatarPreview" alt="Avatar">
        <input type="file" id="avatarFile" accept="image/*">
        <div class="avatar-actions">
          <button type="button" class="btn-secondary" onclick="removeAvatar()">Xóa ảnh</button>
        </div>
      </div>

      <!-- FORM -->
      <div class="form-grid">

        <div class="form-group">
          <label><b>ID</b></label>
          <input id="username" readonly>
        </div>

        <div class="form-group">
          <label><b>Họ và tên</b></label>
          <input id="ho_ten">
        </div>

        <div class="form-group">
          <label><b>Giới tính</b></label>
          <select id="gioi_tinh">
            <option value="">-- chọn --</option>
            <option value="nam">Nam</option>
            <option value="nu">Nữ</option>
          </select>
        </div>

        <div class="form-group">
          <label><b>Ngày sinh</b></label>
          <input type="date" id="ngay_sinh">
        </div>

        <div class="form-group">
          <label><b>Điện thoại</b></label>
          <input id="dien_thoai">
        </div>

        <div class="form-group">
          <label><b>Gmail</b></label>
          <input id="gmail">
        </div>

        <div class="form-group">
          <label><b>Facebook</b></label>
          <input id="facebook">
        </div>

        <div class="form-group">
          <label><b>Zalo</b></label>
          <input id="zalo">
        </div>

        <div class="form-group">
          <label><b>Nơi công tác</b></label>
          <input id="noi_cong_tac">
        </div>

        <div class="form-group">
          <label><b>Học hàm</b></label>
          <select id="hoc_ham"></select>
        </div>

        <div class="form-group">
          <label><b>Chuyên môn</b></label>
          <select id="chuyen_mon"></select>
        </div>

        
        <div class="form-group">
          <label><b>Hình thức dạy</b></label>
          <select id="hinh_thuc">
            <option value="">-- chọn --</option>
            <option value="tructiep">Trực tiếp</option>
            <option value="tructuyen">Trực tuyến</option>
          </select>
        </div>

      </div>

      <!-- ACTIONS -->
      <div class="actions">
        

<button id="btnRegister" class="btn-primary" onclick="register()">Đăng ký</button>
<button id="btnUpdate" class="btn-secondary" onclick="updateProfile()">Cập nhật</button>

        <button class="btn-secondary" onclick="goHome()">Home</button>
	<button class="btn-secondary" onclick="gopage()">My page</button>
      </div>

    </div>
  </div>

  <script type="module" src="hosogiaovien.js"></script>
</body>
</html>
