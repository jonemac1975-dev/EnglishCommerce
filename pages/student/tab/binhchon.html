<div class="tab-content">
  <h2>BÌNH CHỌN GIÁO VIÊN</h2>

  <div class="form">
    <input type="number" id="year" placeholder="Năm">
    <select id="month"></select>
    <select id="week"></select>

    <select id="teacher"></select>

    <div id="stars">
      <span data-star="1">⭐</span>
      <span data-star="2">⭐</span>
      <span data-star="3">⭐</span>
      <span data-star="4">⭐</span>
      <span data-star="5">⭐</span>
    </div>

    <textarea id="comment" placeholder="Nhận xét..."></textarea>

    <button id="submit">Gửi bình chọn</button>
  </div>

  <hr>

  <h3>Danh sách bình chọn</h3>
  <table>
    <thead>
      <tr>
        <th>Năm</th>
        <th>Tháng</th>
        <th>Tuần</th>
        <th>Sao</th>
        <th>Comment</th>
      </tr>
    </thead>
    <tbody id="list"></tbody>
  </table>
</div>
