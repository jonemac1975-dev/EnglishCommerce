<section class="hv-tab-wrap">

  <h2 class="hv-tab-title">BẢNG ĐIỂM THI TOEIC</h2>

  <div class="toeic-layout">

    <!-- LEFT SUMMARY -->
    <div class="hv-score-summary" id="hvScoreSummary">

      <div class="hv-score-card">
        <div class="hv-score-label">Tổng bài</div>
        <div class="hv-score-value" id="sumTongBai">0</div>
      </div>

      <div class="hv-score-card">
        <div class="hv-score-label">Điểm cao nhất</div>
        <div class="hv-score-value" id="sumMaxScore">0</div>
      </div>

      <div class="hv-score-card">
        <div class="hv-score-label">Điểm trung bình</div>
        <div class="hv-score-value" id="sumAvgScore">0</div>
      </div>

      <div class="hv-score-card">
        <div class="hv-score-label">Lần thi gần nhất</div>
        <div class="hv-score-value small" id="sumLastDate">--</div>
      </div>

    </div>

    <!-- RIGHT TABLE -->
    <div class="toeic-right">

      <div class="hv-table-wrap">
        <table class="hv-table">

          <thead>
            <tr>
              <th>STT</th>
              <th>Giáo viên</th>
              <th>Đề số</th>
              <th>Điểm TOEIC</th>
              <th>Xếp loại</th>
              <th>Ngày</th>
              <th>Chi tiết</th>
            </tr>
          </thead>

          <tbody id="diemTestBody">
            <tr>
              <td colspan="7" style="text-align:center;color:#64748b;padding:20px;">
                Chưa có dữ liệu thi TOEIC
              </td>
            </tr>
          </tbody>

        </table>
      </div>

    </div>

  </div>

</section>
