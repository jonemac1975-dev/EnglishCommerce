<div class="form-box">
  <label>Ảnh:</label>
  <div class="avatar-box">

  </div>

  <label>Họ và tên:</label>
  <select id="hvTen"></select>

  <label>Lớp:</label>
  <input id="hvLop" type="text" readonly>

  <label>Môn học:</label>

  <label>Tháng:</label>

  <div class="btn-row">
    <button id="btnThem">Thêm</button>
    <button id="btnLuu" style="display:none">Lưu</button>
    <button id="btnXoa" style="display:none">Xóa</button>
  </div>
</div>

<table class="admin-table">
  <thead>
    <tr>
      <th>STT</th>
      <th>Họ tên</th>
      <th>Lớp</th>
      <th>Môn học</th>
      <th>Tháng</th>
      <th>Thành tích</th>
    </tr>
  </thead>
  <tbody id="hvTable"></tbody>
</table>
