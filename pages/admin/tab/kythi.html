<div class="dm-wrapper">

  <h2 class="dm-title">CẬP NHẬT KỲ THI</h2>

  <div class="dm-form">
    <input id="dmName" type="text" placeholder="Nhập tên kỳ thi">
    
    <!-- 🔥 Thêm thời gian -->
    <input id="dmThoiGian" type="number" min="1" placeholder="Thời gian (phút)">

    <div class="dm-actions">
      <button onclick="addItem()">Thêm</button>
      <button onclick="saveItem()">Lưu</button>
      <button onclick="deleteItem()">Xóa</button>
    </div>
  </div>

  <table class="dm-table">
    <thead>
      <tr>
        <th>STT</th>
        <th>Tên</th>
        <th>Thời gian (phút)</th> <!-- 🔥 thêm cột -->
      </tr>
    </thead>
    <tbody id="dmList"></tbody>
  </table>

</div>
