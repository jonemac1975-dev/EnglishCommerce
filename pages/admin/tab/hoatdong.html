<h2>CẬP NHẬT HOẠT ĐỘNG</h2>

<div class="form-box">
  <label>Tiêu đề:</label>
  <input type="text" id="hdTieuDe">

  <label>Link (MP4 / YouTube):</label>
  <input type="text" id="hdLink">

<label>Ảnh hoạt động:</label>
<input type="file" id="hdImage" accept="image/*">

<div id="previewBox" style="margin-top:10px"></div>

  <div class="btn-row">
    <button id="btnThem">Thêm</button>
    <button id="btnLuu" style="display:none">Lưu</button>
    <button id="btnXoa" style="display:none">Xóa</button>
  </div>
</div>

<table class="admin-table">
  <thead>
    <tr>
  <th>STT</th>
  <th>Ảnh</th>
  <th>Tiêu đề</th>
  <th>Link</th>
</tr>
  </thead>
  <tbody id="hoatdongTable"></tbody>
</table>

<div id="toast" class="toast"></div>
