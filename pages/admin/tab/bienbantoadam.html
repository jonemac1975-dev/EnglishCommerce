<!-- ================= TRANSCRIPT ================= -->

    Nội dung ghi âm / Transcript

  <textarea
    id="bbTranscript"

      min-height:250px;
      resize:vertical;
    "

<div class="row">

    type="button"

<div class="row">

  <label>
    Kết quả AI
  </label>

  <div
    id="bbAiResult"
    class="editor-word"
    contenteditable="true">

</div>

<div class="row">

  <button
    type="button"
    id="btnChuyenBienBan">

<button

  </div>

</div>

</div>
