<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Preview bài giảng</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  * {
    box-sizing: border-box;
  }

  html, body {
    margin: 0;
    padding: 0;
    min-height: 100%;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #e5e7eb;
    color: #111827;
  }

  body.fullscreen-active {
    overflow: hidden;
  }

  .preview-wrapper {
    max-width: 1100px;
    margin: 28px auto;
    background: #ffffff;
    padding: 36px 42px;
    border-radius: 18px;
    box-shadow: 0 24px 70px rgba(15, 23, 42, 0.08);
    min-height: 100vh;
    overflow: visible;
  }

  .lesson-title {
    font-size: 30px;
    font-weight: 900;
    text-align: center;
    margin-bottom: 8px;
    color: #0f172a;
  }

  .lesson-meta {
    text-align: center;
    font-size: 14px;
    color: #64748b;
    margin-bottom: 28px;
  }

  .lesson-content {
    font-size: 16px;
    line-height: 1.75;
    word-wrap: break-word;
    overflow: visible;
    min-height: 60vh;
  }

  .lesson-content * {
    max-width: 100%;
    box-sizing: border-box;
  }

  /* ===== TABLE ===== */
  .lesson-content table {
    width: 100% !important;
    border-collapse: collapse !important;
    margin: 14px 0 !important;
  }

  .lesson-content th,
  .lesson-content td {
    border: 1px solid #cbd5e1 !important;
    padding: 10px 12px !important;
    text-align: left !important;
    vertical-align: top !important;
  }

  /* ===== WORD TEXT ===== */
  .word-text {
    white-space: pre-wrap;
    font-family: "Times New Roman", serif;
    font-size: 16px;
    line-height: 1.8;
    margin: 0;
  }

  /* ===== TOP CONTROLS ===== */
  .top-controls {
    position: fixed;
    top: 12px;
    left: 12px;
    z-index: 9999;
    display: flex;
    gap: 10px;
  }

  #btnHome,
  #btnFullscreen {
    background: rgba(15, 23, 42, 0.78);
    color: #fff;
    border: none;
    padding: 8px 12px;
    font-size: 14px;
    border-radius: 10px;
    cursor: pointer;
    text-decoration: none;
    transition: 0.2s ease;
  }

  #btnHome:hover,
  #btnFullscreen:hover {
    background: rgba(15, 23, 42, 0.92);
    transform: translateY(-1px);
  }

  #btnFs {
    position: fixed;
    top: 12px;
    right: 12px;
    z-index: 9999;
    font-size: 18px;
    padding: 8px 12px;
    border: none;
    border-radius: 10px;
    background: rgba(15, 23, 42, 0.78);
    color: #fff;
    cursor: pointer;
    transition: 0.2s ease;
  }

  #btnFs:hover {
    background: rgba(15, 23, 42, 0.92);
    transform: translateY(-1px);
  }

  /* ===== DOC FRAME ===== */
  .doc-frame {
    width: 100%;
    height: 80vh;
    border: none;
    border-radius: 14px;
    box-shadow: 0 14px 30px rgba(15,23,42,0.08);
  }

  /* =========================================
     TOEIC PREVIEW UI
  ========================================= */
  .tb-preview-media {
    margin: 18px 0;
    padding: 18px;
    border-radius: 22px;
    background: #f8fafc;
    border: 1px solid rgba(15,23,42,0.06);
    text-align: center;
  }

  .tb-preview-media img {
    max-width: 70%;
    border-radius: 16px;
    box-shadow: 0 12px 24px rgba(15,23,42,0.08);
  }

  .tb-preview-media audio {
    width: min(380px, 100%);
  }

  .tb-preview-media video,
  .tb-preview-media iframe {
    width: min(720px, 100%);
    max-width: 100%;
    aspect-ratio: 16 / 9;
    border: none;
    border-radius: 18px;
    box-shadow: 0 14px 30px rgba(15,23,42,0.08);
    background: #000;
  }

  .tb-preview-passage {
    margin-bottom: 16px;
    padding: 16px 18px;
    background: #f8fafc;
    border: 1px solid rgba(15,23,42,0.06);
    border-radius: 18px;
    color: #334155;
    line-height: 1.85;
  }

  .tb-preview-question {
    background: #ffffff;
    border: 1px solid rgba(15,23,42,0.06);
    border-radius: 24px;
    padding: 22px;
    margin-bottom: 22px;
    box-shadow: 0 12px 28px rgba(15,23,42,0.04);
  }

  .tb-preview-qtop {
    margin-bottom: 14px;
  }

  .tb-qbadge {
    display: inline-flex;
    align-items: center;
    padding: 8px 14px;
    border-radius: 999px;
    background: rgba(22,61,143,0.08);
    color: #163d8f;
    font-weight: 900;
    font-size: 12px;
    letter-spacing: 0.8px;
    text-transform: uppercase;
  }

  .tb-preview-qtext {
    font-size: 19px;
    font-weight: 800;
    color: #0f172a;
    margin-bottom: 16px;
    line-height: 1.8;
  }

  .tb-preview-options {
    display: grid;
    gap: 12px;
  }

  .tb-preview-option {
    display: flex;
    align-items: center;
    gap: 14px;
    border-radius: 18px;
    border: 1px solid rgba(15,23,42,0.08);
    background: #ffffff;
    padding: 15px 16px;
  }

  .tb-preview-option.correct {
    background: rgba(21,128,61,0.06);
    border-color: rgba(21,128,61,0.18);
  }

  .tb-preview-letter {
    width: 40px;
    height: 40px;
    min-width: 40px;
    border-radius: 14px;
    background: linear-gradient(135deg, #163d8f, #295fcf);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 900;
  }

  .tb-preview-optext {
    flex: 1;
    color: #334155;
    font-weight: 700;
    line-height: 1.75;
  }

  .tb-preview-ok {
    color: #15803d;
    font-size: 18px;
    font-weight: 900;
  }

  .tb-empty-preview {
    min-height: 220px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    color: #94a3b8;
    text-align: center;
  }

  .tb-empty-icon {
    font-size: 44px;
    margin-bottom: 10px;
  }

  /* ===== FULLSCREEN ===== */
  :fullscreen,
  :fullscreen body {
    background: #fff !important;
  }

  ::backdrop {
    background: #e5e7eb !important;
  }

  :fullscreen .preview-wrapper {
    max-width: 100vw !important;
    width: 100vw !important;
    min-height: 100vh !important;
    margin: 0 !important;
    border-radius: 0 !important;
    padding-top: 10px !important;
    height: 100vh;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  :fullscreen .lesson-title {
    margin-top: 0 !important;
  }

  :fullscreen .doc-frame {
    height: 100vh !important;
  }

  @media (max-width: 768px) {
    .preview-wrapper {
      margin: 12px;
      padding: 20px 16px;
      border-radius: 16px;
    }

    .lesson-title {
      font-size: 24px;
    }

    .tb-preview-qtext {
      font-size: 17px;
    }

    .tb-preview-media img {
      max-width: 100%;
    }
  }
</style>
</head>

<body>

<button id="btnFs">⛶</button>

<div class="top-controls">
  <a href="../index.html" id="btnHome"><==</a>
</div>

<div class="preview-wrapper">
  <div class="lesson-title" id="pTitle"></div>
  <div class="lesson-meta" id="pMeta"></div>
  <div class="lesson-content" id="pContent"></div>
</div>

<script>
const data = JSON.parse(localStorage.getItem("lesson_preview") || "{}");

const titleEl = document.getElementById("pTitle");
const metaEl  = document.getElementById("pMeta");
const contentEl = document.getElementById("pContent");

titleEl.innerText = data.title || data.name || "Bài giảng";
metaEl.innerText  = data.meta || "";

/* ===== UTIL ===== */
function isURL(text) {
  return /^https?:\/\//i.test(text.trim());
}

function isDrivePreview(url) {
  return url.includes("drive.google.com") && url.includes("/preview");
}

function isPDF(url) {
  return url.toLowerCase().endsWith(".pdf") || isDrivePreview(url);
}

function isFlipbook(url) {
  return url.endsWith(".html");
}

function isLikelyToeicTest(html) {
  const text = stripHtml(html || "");
  return (
    /câu\s*\d+/i.test(text) ||
    /question\s*\d+/i.test(text) ||
    /^[A-D][\.\)\-:]/im.test(text)
  );
}

function escapeHtml(str = "") {
  return str
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}

function stripHtml(html = "") {
  const div = document.createElement("div");
  div.innerHTML = html;
  return div.innerText || div.textContent || "";
}

/* ===== WORD CLEAN ===== */
function cleanWordHTML(html) {
  if (!html) return "<i>Không có nội dung</i>";

  return html
    .replace(/class="?Mso[a-zA-Z0-9]*"?/g, "")
    .replace(/style="[^"]*mso-[^"]*"/g, "")
    .replace(/<o:p>\s*<\/o:p>/g, "")
    .replace(/<span style="[^"]*"><\/span>/g, "")
    .replace(/<!--\[if[^>]*>.*?<!\[endif\]-->/g, "");
}

/* ===== TOEIC RENDER ===== */
function renderToeicPreview(html) {
  const tempDiv = document.createElement("div");
  tempDiv.innerHTML = html;

  const blocks = tempDiv.querySelectorAll("p, div, img, audio, video, iframe");
  let out = "";
  let qIndex = 0;
  let currentQuestionOpen = false;

  blocks.forEach(el => {
    const tag = el.tagName.toLowerCase();

    /* ========= MEDIA ========= */
    if (["img", "audio", "video", "iframe"].includes(tag)) {
      out += `<div class="tb-preview-media">${el.outerHTML}</div>`;
      return;
    }

    const text = (el.innerText || "").trim();
    if (!text) return;

    const isQuestion =
      /^câu\s*\d+/i.test(text) ||
      /^question\s*\d+/i.test(text);

    const isOption = /^[A-D][\.\)\-:]/i.test(text);

    if (isQuestion) {
      if (currentQuestionOpen) out += `</div></div>`;

      qIndex++;
      out += `
        <div class="tb-preview-question">
          <div class="tb-preview-qtop">
            <span class="tb-qbadge">Question ${qIndex}</span>
          </div>
          <div class="tb-preview-qtext">${escapeHtml(text)}</div>
          <div class="tb-preview-options">
      `;
      currentQuestionOpen = true;
      return;
    }

    if (isOption) {
      const letter = text.charAt(0).toUpperCase();
      const optionText = text
        .replace(/^[A-D][\.\)\-:]\s*/i, "")
        .replace(/\*/g, "")
        .trim();

      const isCorrect = text.includes("*");

      out += `
        <div class="tb-preview-option ${isCorrect ? "correct" : ""}">
          <div class="tb-preview-letter">${letter}</div>
          <div class="tb-preview-optext">${escapeHtml(optionText)}</div>
          ${isCorrect ? `<div class="tb-preview-ok">✔</div>` : ""}
        </div>
      `;
      return;
    }

    out += `<div class="tb-preview-passage">${escapeHtml(text)}</div>`;
  });

  if (currentQuestionOpen) out += `</div></div>`;

  return out || `
    <div class="tb-empty-preview">
      <div class="tb-empty-icon">📝</div>
      <p>Không parse được nội dung</p>
    </div>
  `;
}

/* ===== MAIN RENDER ===== */
(function render() {
  const raw = (data.content || "").trim();

  if (!raw) {
    contentEl.innerHTML = "<i>Không có nội dung</i>";
    return;
  }

  // CASE: LINK THUẦN
  if (isURL(raw)) {
    let label = "📄 Tài liệu";

    if (isFlipbook(raw)) label = "📕 Sách lật";
    else if (isPDF(raw)) label = "📄 PDF / PPT";

    contentEl.innerHTML = `
      <div style="text-align:center;font-weight:700;margin-bottom:10px;">
        ${label}
      </div>
      <iframe 
        src="${raw}"
        class="doc-frame"
        loading="lazy"
        allowfullscreen>
      </iframe>
    `;
    return;
  }

  // CASE: TOEIC TEST
  if (isLikelyToeicTest(raw)) {
    contentEl.innerHTML = renderToeicPreview(raw);
    return;
  }

  // CASE: BÀI GIẢNG WORD / HTML THƯỜNG
  contentEl.innerHTML = cleanWordHTML(raw);
})();
</script>

<script>
const btn = document.getElementById("btnFs");

btn.onclick = async () => {
  if (!document.fullscreenElement) {
    await document.documentElement.requestFullscreen();
    document.body.classList.add("fullscreen-active");
  } else {
    await document.exitFullscreen();
    document.body.classList.remove("fullscreen-active");
  }
};
</script>

</body>
</html>
